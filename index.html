<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>
<body>
    <article data-testid="test-todo-card">
        <div>
            <label>
                <input type="checkbox" data-testid="test-todo-complete-toggle">
                <h2 data-testid="test-todo-title"></h2>
            </label>
            <div class="data">
                <button aria-label="Edit task" data-testid="test-todo-edit-button">Edit</button>
                <button aria-label="Delete task" data-testid="test-todo-delete-button">Delete</button>
            </div>
        </div>

    <div>
         <!-- 🔹 PRIORITY DISPLAY + INDICATOR -->
        <div>
            <!-- visual indicator -->
            <span data-testid="test-todo-priority-indicator" class="priority-dot"></span>

            <!-- text display -->
            <span data-testid="test-todo-priority">High</span>
        </div>


        <!-- 🔹 STATUS DISPLAY + CONTROL -->
        <div>
            <!-- status text (display) -->
            <span data-testid="test-todo-status">Pending</span>
            
            <!-- status dropdown (control) -->
            <select data-testid="test-todo-status-control">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </div>


        <!-- 🔹 EDIT MODE FORM -->
        <form data-testid="test-todo-edit-form" style="display: none;">

            <input data-testid="test-todo-edit-title-input" />
            <textarea data-testid="test-todo-edit-description-input"></textarea>
            <input type="datetime-local" data-testid="test-todo-edit-due-date-input" />
        
            <!-- edit priority -->
            <label>
                Priority:
                <select data-testid="test-todo-edit-priority-select">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </label>

            <!-- status control ALSO exists here if you want -->
            <label>
                Status:
                <select>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
            </label>

            <button type="button" data-testid="test-todo-save-button">Save</button>
            <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
        </form>
    </div>

    <div data-testid="test-todo-collapsible-section">
        <p data-testid="test-todo-description">
            Build a clean, interactive task card...
        </p>
    </div>

    <button data-testid="test-todo-expand-toggle">Show More</button>

        <div>
            <time
                id="dueDateEl"
                data-testid="test-todo-due-date"
                datetime="2026-04-16T23:59:00"
                >
            </time>
            <time
                id="timeRemainingEl"
                data-testid="test-todo-time-remaining"
                datetime="2026-04-16T23:59:00"
                >
            </time>
        </div>
        
        <div>
            <ul data-testid="test-todo-tags" role="list">
                <li data-testid="test-todo-tag-Frontend">Frontend</li>
                <li data-testid="test-todo-tag-UX" >UX</li>
                <li  data-testid="test-todo-tag-Design">Design</li>
                <li  data-testid="test-todo-tag-Sprint-2">Sprint 2</li>
            </ul>
        </div>
    </article>

    <script src="index.js"></script>
</body>
</html>
