<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>HNG Stage 1A</title>
</head>
<body>
    <article data-testid="test-todo-card">

        <!-- ══ VIEW MODE ══ -->
        <div id="viewMode">

            <!-- Row 1: checkbox + title + buttons -->
            <div class="row-header">
                <label>
                    <input type="checkbox" data-testid="test-todo-complete-toggle">
                    <h2 data-testid="test-todo-title">Complete HNG Stage 0 Todo Card</h2>
                </label>
                <div class="data">
                    <button aria-label="Edit task" data-testid="test-todo-edit-button">Edit</button>
                    <button aria-label="Delete task" data-testid="test-todo-delete-button">Delete</button>
                </div>
            </div>

            <!-- Row 2: priority + status -->
            <div class="row-meta">
                <div class="priority-group">
                    <span data-testid="test-todo-priority-indicator" class="priority-dot"></span>
                    <span data-testid="test-todo-priority">High</span>
                </div>
                <div class="status-group">
                    <span data-testid="test-todo-status">Pending</span>
                    <select data-testid="test-todo-status-control">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
            </div>

            <!-- Row 3: collapsible description -->
            <div data-testid="test-todo-collapsible-section" class="collapsible-section">
                <p data-testid="test-todo-description">
                    Build a clean, interactive task card with proper semantics, test IDs, and time-based updates. This description is long enough to trigger the expand/collapse behaviour so testers can verify it works correctly.
                </p>
            </div>
            <button data-testid="test-todo-expand-toggle" class="expand-btn">Show More</button>

            <!-- Row 4: dates + overdue indicator -->
            <div class="row-dates">
                <span data-testid="test-todo-overdue-indicator" class="overdue-badge" style="display:none;">⚠ Overdue</span>
                <time id="dueDateEl"       data-testid="test-todo-due-date"       datetime="2026-04-16T23:59:00"></time>
                <time id="timeRemainingEl" data-testid="test-todo-time-remaining" datetime="2026-04-16T23:59:00"></time>
            </div>

            <!-- Row 5: tags -->
            <div>
                <ul data-testid="test-todo-tags" role="list">
                    <li data-testid="test-todo-tag-Frontend">Frontend</li>
                    <li data-testid="test-todo-tag-UX">UX</li>
                    <li data-testid="test-todo-tag-Design">Design</li>
                    <li data-testid="test-todo-tag-Sprint-2">Sprint 2</li>
                </ul>
            </div>

        </div><!-- /viewMode -->

        <!-- ══ EDIT FORM (hidden until Edit clicked) ══ -->
        <form data-testid="test-todo-edit-form" id="editForm" style="display:none;">
            <h3 class="edit-heading">Edit Task</h3>

            <label class="field-label">Title
                <input type="text" data-testid="test-todo-edit-title-input" />
            </label>

            <label class="field-label">Description
                <textarea data-testid="test-todo-edit-description-input" rows="3"></textarea>
            </label>

            <label class="field-label">Due Date
                <input type="datetime-local" data-testid="test-todo-edit-due-date-input" />
            </label>

            <label class="field-label">Priority
                <select data-testid="test-todo-edit-priority-select">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </label>

            <div class="edit-actions">
                <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
                <button type="button" data-testid="test-todo-save-button">Save</button>
            </div>
        </form>

    </article>

    <script src="index.js"></script>
</body>
</html>
